  <style>
    /* Instant HTML Preloader */
    #global-preloader {
      position: fixed;
      inset: 0;
      background: #06060b;
      /* matches var(--color-bg-primary) */
      z-index: 9999;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: opacity 0.5s ease-out, visibility 0.5s ease-out;
    }

    #global-preloader.hidden {
      opacity: 0;
      visibility: hidden;
    }

    .global-spinner {
      width: 48px;
      height: 48px;
      border: 4px solid rgba(139, 92, 246, 0.2);
      border-top-color: #8b5cf6;
      /* matches var(--color-accent-purple) */
      border-radius: 50%;
      animation: global-spin 1s linear infinite;
    }

    @keyframes global-spin {
      to {
        transform: rotate(360deg);
      }
    }
  </style>
</head>

<body>
  <div id="global-preloader">
    <div class="global-spinner"></div>
  </div>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>
